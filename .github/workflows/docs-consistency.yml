name: docs-consistency

# Guards against the class of documentation drift found in the July 2026 review:
# broken relative doc links, stale burst-node counts, stale "FSx blocked" language,
# and the wrong validation-script path. The support matrix (docs/support-matrix.md)
# is the single source of truth; these checks keep prose from contradicting it.

on:
  push:
    paths: ['**/*.md', 'scripts/check-quotas.sh', 'terraform/generations/**/*.tf']
  pull_request:
    paths: ['**/*.md', 'scripts/check-quotas.sh', 'terraform/generations/**/*.tf']

jobs:
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Relative Markdown links resolve
        run: |
          fail=0
          # For every [text](path.md) or [text](path.md#anchor) link, check the file exists.
          while IFS= read -r line; do
            f="${line%%:*}"; rest="${line#*:}"
            # extract each (target) that ends in .md or .md#...
            echo "$rest" | grep -oE '\]\(([^)]+\.md)(#[^)]*)?\)' | sed -E 's/^\]\(//; s/\)$//; s/#.*//' | while read -r tgt; do
              case "$tgt" in
                http*|"") continue ;;
              esac
              dir="$(dirname "$f")"
              [ -f "$dir/$tgt" ] || { echo "::error file=$f::broken doc link -> $tgt"; echo BROKEN; }
            done
          done < <(grep -rn --include='*.md' -E '\]\([^)]+\.md' . ) | grep -q BROKEN && fail=1
          [ "$fail" -eq 0 ] && echo "OK: all relative .md links resolve"
          exit "$fail"

      - name: No stale burst-node counts (must be 10, not 8)
        run: |
          # max_burst_nodes default is 10 across all generations. Flag "8 burst" prose.
          if grep -rniE '(up to|max(imum)?|all) (8|eight) burst' --include='*.md' .; then
            echo "::error::Found stale '8 burst nodes' text — the default is 10. Update to match docs/support-matrix.md."
            exit 1
          fi
          echo "OK: no stale burst-node counts"

      - name: No stale 'FSx blocked' language
        run: |
          # FSx on Gen 3-5 is now client-available via burstlab-lustre. "FSx blocked" is stale.
          if grep -rniE 'fsx.{0,20}(blocked|is blocked)' --include='*.md' . \
               | grep -viE 'support-matrix|was blocked|previously blocked'; then
            echo "::error::Found stale 'FSx blocked' language. See docs/support-matrix.md for current status."
            exit 1
          fi
          echo "OK: no stale FSx-blocked language"

      - name: Validation scripts referenced at correct path (/opt/slurm/etc)
        run: |
          # validate-cluster.sh / demo-burst.sh are deployed to /opt/slurm/etc, not /bin.
          if grep -rnE '/opt/slurm/bin/(validate-cluster|demo-burst)\.sh' --include='*.md' .; then
            echo "::error::Wrong path: these scripts live in /opt/slurm/etc, not /opt/slurm/bin."
            exit 1
          fi
          echo "OK: validation-script paths correct"

      - name: No stale 8-burst example output (aws-burst-[0-7])
        run: |
          # Sample sinfo output must reflect the 10-node default, not the old 8.
          if grep -rnE 'aws-burst-\[0-7\]' --include='*.md' .; then
            echo "::error::Stale 8-node example (aws-burst-[0-7]). Default is 10 -> aws-burst-[0-9]."
            exit 1
          fi
          echo "OK: no stale 8-node burst examples"

      - name: check-quotas.sh burst count matches max_burst_nodes default
        run: |
          # The quota script's MAX_BURST_NODES must equal the Terraform default so it
          # never reports "sufficient capacity" for less than the documented maximum.
          tf_default="$(grep -hA4 'variable "max_burst_nodes"' \
            terraform/generations/*/variables.tf | grep -oE 'default *= *[0-9]+' \
            | grep -oE '[0-9]+' | sort -u)"
          script_val="$(grep -oE 'MAX_BURST_NODES=[0-9]+' scripts/check-quotas.sh \
            | grep -oE '[0-9]+')"
          echo "terraform default(s): $tf_default ; check-quotas.sh: $script_val"
          if [ "$(echo "$tf_default" | wc -l)" -ne 1 ]; then
            echo "::error::max_burst_nodes default differs across generations: $tf_default"
            exit 1
          fi
          if [ "$tf_default" != "$script_val" ]; then
            echo "::error::check-quotas.sh MAX_BURST_NODES=$script_val != terraform default $tf_default"
            exit 1
          fi
          # And no hardcoded stale 104-vCPU full requirement anywhere.
          if grep -rnE 'needed-full=104|NEEDED_FULL=104' . \
               --include='*.md' --include='*.sh'; then
            echo "::error::Stale 104-vCPU full-burst requirement (should be 120 for 10 nodes)."
            exit 1
          fi
          echo "OK: quota script burst count matches Terraform default"

      - name: No overstated 'all five generations fully tested' claim
        run: |
          if grep -rniE 'all five generations are fully (built and )?tested' --include='*.md' .; then
            echo "::error::Overstated validation claim. Say 'validated for cloud bursting; workload validation varies — see support matrix'."
            exit 1
          fi
          echo "OK: no overstated validation claim"

      - name: Abbreviated tfvars edits list all four required values
        run: |
          # Any "Edit terraform.tfvars: set ..." instruction must name all four required
          # values, so abbreviated deploy paths can't drift from quickstart Step 2.
          bad="$(grep -rn 'Edit terraform.tfvars: set' --include='*.md' . || true)"
          fail=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            for v in aws_profile aws_region key_name head_node_ami; do
              echo "$line" | grep -q "$v" || { echo "::error::$line -- missing $v"; fail=1; }
            done
          done <<< "$bad"
          [ "$fail" -eq 0 ] && echo "OK: tfvars edit instructions are complete"
          exit "$fail"

      - name: Runnable 'packer build' lines are paired with 'packer init'
        run: |
          # A clean checkout needs 'packer init' before 'packer build'. Only consider
          # runnable command lines (packer build at start of line, allowing leading
          # whitespace or a shell var assignment) — not prose that merely mentions it.
          fail=0
          for f in $(grep -rlE '^[[:space:]]*([A-Z_]+=[^ ]+[[:space:]]+)?packer build' --include='*.md' .); do
            if ! grep -q 'packer init' "$f"; then
              echo "::error file=$f::runnable 'packer build' without 'packer init' in the same doc"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "OK: runnable packer build lines are paired with packer init"
          exit "$fail"

      - name: Generation modules must not hardcode region-specific AZs
        run: |
          # AZs are derived from data.aws_availability_zones so clusters are region-
          # portable. A literal "<region>a"/"<region>b" AZ string reintroduces the
          # us-west-2-only bug the docs used to hide.
          if grep -rnE '"(us|eu|ap|sa|ca|me|af)-[a-z]+-[0-9][a-z]"' terraform/generations/*/main.tf; then
            echo "::error::Hardcoded availability zone in a generation module. Use data.aws_availability_zones.available.names[N] instead."
            exit 1
          fi
          echo "OK: no hardcoded AZs in generation modules"

      - name: No stale burst node-range arithmetic (aws-burst-[1-7])
        run: |
          # With 10 burst nodes, one-allocated leaves aws-burst-[1-9], not [1-7].
          if grep -rnE 'aws-burst-\[1-7\]' --include='*.md' .; then
            echo "::error::Stale node-range example (aws-burst-[1-7]); with 10 nodes it is [1-9]."
            exit 1
          fi
          echo "OK: no stale burst node-range arithmetic"

      - name: Canonical deploy docs pass aws_region to packer build
        run: |
          # aws_region is a Packer variable defaulting to us-west-2; exporting the shell
          # var does not reach Packer, so an alternate-region build silently targets
          # us-west-2. The canonical deploy paths must pass -var aws_region. (ami/README
          # is excluded: it demonstrates single -var overrides one at a time on purpose.)
          bad="$(grep -nE '^[[:space:]]*packer build' \
            README.md docs/quickstart.md docs/quickstart-ubuntu.md 2>/dev/null \
            | grep -v 'aws_region' || true)"
          if [ -n "$bad" ]; then
            echo "::error::canonical 'packer build' without -var aws_region:"; echo "$bad"
            exit 1
          fi
          echo "OK: canonical deploy docs pass aws_region"

      - name: README defines every env var it uses
        run: |
          # SSH_KEY / BURSTLAB_ROOT / AWS_PROFILE / AWS_REGION are used throughout the
          # README; each must be exported in the setup block or a reader hits an unset var.
          fail=0
          for v in BURSTLAB_ROOT AWS_PROFILE AWS_REGION SSH_KEY; do
            if grep -q "\$$v\|\${$v}\|\"\$$v\"" README.md && ! grep -qE "export $v=" README.md; then
              echo "::error::README uses \$$v but never 'export $v='"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "OK: README exports every env var it uses"
          exit "$fail"

      - name: No stale 'all 3 generations' (five exist)
        run: |
          if grep -rniE 'all (3|three) generations' --include='*.md' --include='*.sh' .; then
            echo "::error::Stale 'all 3 generations' — BurstLab has five. Report available count or say five."
            exit 1
          fi
          echo "OK: no stale 3-generation claim"

      - name: Scenario 4 lifecycle count is four, not three
        run: |
          # Scenario 3 has three approaches (0/A/B); Scenario 4 has four (adds Burst
          # Buffer C). Flag any "Ephemeral FSx ... three lifecycle" drift.
          if grep -rniE 'Ephemeral FSx.*three lifecycle' --include='*.md' .; then
            echo "::error::Scenario 4 (FSx) has FOUR lifecycle approaches (0/A/B/C), not three."
            exit 1
          fi
          echo "OK: Scenario 4 lifecycle count correct"

      - name: Ed25519 requested in key-pair creation commands
        run: |
          # Rocky 10's crypto policy rejects RSA-2048, so create-key-pair must request
          # ed25519 explicitly. Flag any create-key-pair that omits --key-type ed25519.
          bad="$(grep -rn 'create-key-pair' --include='*.md' --include='*.sh' . | grep 'key-name burstlab-key' | grep -v 'ed25519' || true)"
          if [ -n "$bad" ]; then
            echo "::error::create-key-pair without --key-type ed25519:"; echo "$bad"
            exit 1
          fi
          echo "OK: key-pair creation requests ed25519"

      - name: Workload env files must not hardcode a runtime region
        run: |
          # Generated scenario env files and head-node job commands should carry the
          # deployment's $AWS_REGION, not a literal us-west-2, or CLI ops on the head
          # node target the wrong region when deployed elsewhere.
          if grep -rnE 'AWS_REGION=us-west-2' --include='*.md' docs/workloads/; then
            echo "::error::Hardcoded AWS_REGION=us-west-2 in a workload doc; use \$AWS_REGION."
            exit 1
          fi
          echo "OK: workload docs carry \$AWS_REGION, not a literal region"

      - name: Scenario overlay applies are preceded by tfvars config
        run: |
          # A 'terraform ... <scenario-dir> apply' in a deploy doc must be accompanied by
          # a 'cp terraform.tfvars.example' for that scenario in the same file, so readers
          # configure gen_state_path/profile/region/cluster_name before applying.
          fail=0
          for f in README.md docs/workloads/overview.md; do
            if grep -qE 'workloads/scenario[0-9][^ ]*" (init|apply)|chdir="[^"]*scenario[0-9]' "$f" \
               && ! grep -q 'cp terraform.tfvars.example' "$f"; then
              echo "::error file=$f::scenario apply without a 'cp terraform.tfvars.example' config step"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "OK: scenario applies include tfvars config"
          exit "$fail"
