name: secrets-guard

# Fails the build if Terraform state, backups, tfvars, or private keys ever get
# tracked again. This is a backstop for .gitignore — .gitignore only protects
# *untracked* files, so a `git add -f` (or a file added before the ignore rule)
# can still slip secrets into history. See issue #1.

on:
  push:
  pull_request:

jobs:
  no-tracked-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject tracked Terraform state / tfvars / private keys
        run: |
          # Patterns that must never be tracked. terraform.tfvars.example is
          # allowed (it is the template); real terraform.tfvars is not.
          violations="$(git ls-files \
            | grep -E '(\.tfstate(\.backup)?$|/terraform\.tfvars$|\.pem$|\.key$|(^|/)id_rsa$|(^|/)id_ed25519$)' \
            || true)"

          if [ -n "$violations" ]; then
            echo "::error::Secret-bearing files are tracked in git:"
            echo "$violations" | sed 's/^/  - /'
            echo ""
            echo "Terraform state contains the munge key and DB password in plaintext."
            echo "Remove them with: git rm --cached <file>  (see issue #1)."
            exit 1
          fi
          echo "OK: no tracked state files, tfvars, or private keys."
