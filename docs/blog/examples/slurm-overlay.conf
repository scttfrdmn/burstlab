# --- Verify placement without spending anything ------------------------------
#  sbatch --test-only reports which node Slurm WOULD pick, no instance launched:
#    sbatch --test-only -p general -c 4  --mem=8G   --wrap true   # -> a c-2xl
#    sbatch --test-only -p general -c 4  --mem=48G  --wrap true   # -> an r-2xl
#    sbatch --test-only -p general -c 24 --mem=48G  --wrap true   # -> a c-8xl
#    sbatch --test-only -p general -c 8  --mem=200G --wrap true   # -> an r-8xl
#  (With Spot in the pool, the picked node is the cpu-spot variant of each.)
