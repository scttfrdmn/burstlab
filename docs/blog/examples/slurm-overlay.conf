# =============================================================================
#  slurm-overlay.conf  —  the policy layer for cluster-rightsizing.yaml
# -----------------------------------------------------------------------------
#  ParallelCluster generates the base slurm.conf (the NodeName / NodeSet /
#  PartitionName plumbing for each queue). This file is merged on top of it via
#  SlurmSettings.CustomSlurmSettingsIncludeFile. It does ONE job: compose the
#  single user-facing "general" partition from the two per-capacity queues, and
#  set partition policy.
#
#  It does NOT set node Weight. Weight comes from DynamicNodePriority in the
#  cluster YAML. Do NOT add "NodeName=... Weight=..." lines here: Slurm treats a
#  second NodeName line for an existing node as a DUPLICATE definition and
#  slurmctld exits with a fatal error ("Duplicated NodeHostName ..."), so the
#  cluster fails to create. (Verified the hard way.)
#
#  NODE NAMING: ParallelCluster derives NodeSet names from the queue names.
#  Queues "cpu-od" and "cpu-spot" produce NodeSets "cpu-od_nodes" and
#  "cpu-spot_nodes" (confirmed on a live 3.15.1 cluster).
# =============================================================================

# Unified partition users submit to. Spans both the On-Demand and Spot node
# sets. Slurm filters to nodes whose CPUs AND RealMemory fit the job, then picks
# the lowest Weight (Spot shapes carry lower DynamicNodePriority, so they win
# when Spot capacity exists; Slurm falls back to the On-Demand twin otherwise).
#
# MaxNodes caps the WHOLE partition. MaxCount in the YAML is only PER SHAPE:
# 12 shapes x 50 would otherwise allow 600 nodes. Set this to your real ceiling.
PartitionName=general Default=YES State=UP MaxTime=3-00:00:00 MaxNodes=50 \
  Nodes=cpu-od_nodes,cpu-spot_nodes

# Hide the raw per-capacity partitions ParallelCluster auto-generates, so users
# only see "general". (They keep working; they're just not offered.)
PartitionName=cpu-od   Hidden=YES State=UP
PartitionName=cpu-spot Hidden=YES State=UP

