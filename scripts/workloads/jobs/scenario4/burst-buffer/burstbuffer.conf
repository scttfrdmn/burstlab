# =============================================================================
# burstbuffer.conf — Burst Buffer configuration for BurstLab FSx Lustre
#
# Deployed to /opt/slurm/etc/burstbuffer.conf
# Add to slurm.conf: BurstBufferType=burst_buffer/lua
#
# Prerequisites:
#   1. Slurm must be built with --with-lua (verify: ls /opt/slurm-baked/lib/slurm/burst_buffer_lua.so)
#   2. Lua must be installed on the head node (dnf install lua)
#   3. This file deployed to /opt/slurm/etc/burstbuffer.conf
#   4. fsx-bb.lua deployed to /opt/slurm/etc/fsx-bb.lua
#
# User directives in job scripts:
#   #BB create_persistent name=myfsx capacity=1200GB access=striped type=scratch
#
# Granularity: minimum allocation size (FSx SCRATCH_2 minimum is 1200 GB)
# StageInTimeout: covers FSx provision time (max 20 min = 1200s, plus buffer)
# StageOutTimeout: covers export task wait (max 30 min = 1800s, plus buffer)
# =============================================================================

BurstBufferType=burst_buffer/lua
Granularity=1200GB
DefaultPool=fsx
Flags=EnablePersistent
StageInTimeout=1800
StageOutTimeout=2400
