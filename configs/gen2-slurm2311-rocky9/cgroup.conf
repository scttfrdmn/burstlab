# =============================================================================
# cgroup.conf — BurstLab Gen 2
# Slurm 23.11.x / Rocky Linux 9
#
# Rocky Linux 9 EC2 AMIs use cgroup v2 exclusively. The legacy cgroup v1
# hierarchy (e.g., /sys/fs/cgroup/freezer) is not present. CgroupPlugin
# must be set to cgroup/v2; using cgroup/v1 causes slurmd to fail at
# startup with "cgroup namespace 'freezer' not mounted".
#
# Note: CgroupAutomount was removed in Slurm 23.11. Leaving it in cgroup.conf
# causes slurmd to exit with an error ("option is defunct"). Do not add it.
# =============================================================================

CgroupPlugin=cgroup/v2

# Constrain to allocated resources.
ConstrainCores=yes
ConstrainRAMSpace=yes
ConstrainSwapSpace=no
ConstrainDevices=no
