# =============================================================================
# cgroup.conf — BurstLab Gen 3
# Slurm 24.05.x / Rocky Linux 10
#
# Rocky Linux 10 (RHEL 10) uses cgroup v2 exclusively. The legacy cgroup v1
# hierarchy is not mounted. Slurm 24.05 provides full cgroup/v2 support.
#
# CgroupPlugin=cgroup/v2:
#   - Required on Rocky 10 (v1 not available)
#   - Uses the unified hierarchy at /sys/fs/cgroup
#   - Better memory accounting than v1 (includes memory.swap)
#   - Supported since Slurm 22.05 but required from Slurm 24.05 on Rocky 10
#
# ConstrainSwapSpace=yes is safe to enable on cgroup/v2 because the v2
# memory controller uses memory.swap.max which is a first-class knob,
# unlike v1 where swap accounting required separate kernel parameters.
# =============================================================================

CgroupPlugin=cgroup/v2

# Constrain to allocated resources.
ConstrainCores=yes
ConstrainRAMSpace=yes
# Enable swap constraint on v2 — the v2 memory controller tracks swap cleanly.
ConstrainSwapSpace=yes
ConstrainDevices=no
