# =============================================================================
# cgroup.conf — Linux cgroup configuration for Slurm
# BurstLab Gen 1 — Slurm 22.05.11 / CentOS 8
#
# Required because slurm.conf sets:
#   ProctrackType=proctrack/cgroup
#   TaskPlugin=task/affinity,task/cgroup
#
# CentOS 8 uses cgroup v1 by default. These settings constrain jobs to
# their allocated resources and prevent runaway jobs from impacting other
# users — important for shared on-prem clusters.
# =============================================================================

CgroupAutomount=no
CgroupMountpoint=/sys/fs/cgroup

# Constrain memory: jobs cannot use more RAM than requested.
# Without this, a job requesting 4GB can OOM-kill the whole node.
ConstrainCores=yes
ConstrainRAMSpace=yes

# Allow some swap headroom to prevent instant OOM kills during startup.
ConstrainSwapSpace=no

# Constrain to allocated devices (needed for GPU partitions in later gens).
ConstrainDevices=no
